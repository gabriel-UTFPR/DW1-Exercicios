<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <script src="Script.js"></script>
    <title>Menu - Clientes</title>
</head>
<body>
    <header>
        <img src="imagens/carrinho.png" alt="Carrinho de compras">
        <h1>Clientes - Mercado V.0</h1>
        <select name="pagina" id="pagina" onchange="MudarPagina()">
            <option value="">Mudar de página</option>
            <option value="inicio">Início</option>
           <!--<option value="fornecedores">Fornecedores</option>--> 
            <option value="produtos">Produtos</option>
        </select>
    </header>
    <main>
        <div class="conteinerCliente">
            <label for="inputCliente">Pesquisa:</label>
            <input type="text" id="inputCliente" placeholder="Digite um CPF ou nome...">

            <button onclick="BuscarClientes()">Buscar todos</button>
            <button onclick="BuscarCPF()">Buscar por CPF</button>
            <button onclick="BuscarNomeCliente()">Buscar por Nome</button>
        </div>
        <div id="saidaCliente">Esperando resposta do Servidor...</div>
    </main>
    <footer>
        <h2>Gabriel Soares</h2>
    </footer>
</body>
</html>
