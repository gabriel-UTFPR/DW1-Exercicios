<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="Style.css">
    <title>Enviar Imagem e Mensagens</title>
</head>

<body>
    <header>
        <h1>Cadastro de alunos</h1>
    </header>
    
    <main>
        
        <label for="enderecoServidorInput">Endereço do Servidor:</label>
        <input type="text" id="enderecoServidorInput" placeholder="Digite o endereço do servidor" value="localhost">
        
        <label for="inputPorta">Porta:</label>
        <input type="text" id="inputPorta" placeholder="Digite a porta" value="3000">
        
        <h2>Enviar dados</h2>
        
        <label for="inputRA">RA:</label>
        <input type="text" id="inputRA" placeholder="Digite o RA">
        
        <label for="inputNome">Nome:</label>
        <input type="text" id="inputNome" placeholder="Digite o nome">
        
        <label for="inputNota1">Nota 1:</label>
        <input type="number" id="inputNota1" placeholder="Digite a nota 1">
        
        <label for="inputNota2">Nota 2:</label>
        <input type="number" id="inputNota2" placeholder="Digite a nota 2">
        
        <label for="inputNota3">Nota 3:</label>
        <input type="number" id="inputNota3" placeholder="Digite a nota 3">
        
        <label for="inputNota4">Nota 4:</label>
        <input type="number" id="inputNota4" placeholder="Digite a nota 4">
        
        <button onclick="enviarDados()">Enviar</button>
        
        <h3>Resposta do servidor</h3>
        <span id="respostaDoServidor">.....</span>    
        
        <hr>

        <h2>Envie uma Imagem do aluno para o servidor</h2>
        <label for="inputImagem">Selecione a Imagem:</label>
        <input type="file" id="inputImagem" accept="image/*">
        <button onclick="enviarImagem()">Enviar Imagem</button>

        <h3> Resposta do servidor (Upload)</h3>
        <span id="respostaImagem">.....</span> 
        <span id="imagem"></span> 

        <hr>

    </main>
    
    <script>
        
        async function enviarDados() {            
            const enderecoServidor = document.getElementById('enderecoServidorInput').value;
            const porta = document.getElementById('inputPorta').value;
             
            let inputRA= document.getElementById('inputRA');
            let inputNome= document.getElementById('inputNome');
            let inputNota1= document.getElementById('inputNota1');
            let inputNota2= document.getElementById('inputNota2');
            let inputNota3= document.getElementById('inputNota3');
            let inputNota4= document.getElementById('inputNota4');
            
            let ra= inputRA.value;
            let nome= inputNome.value;
            let nomesplit=nome.split(" ")
            let n1= parseFloat(inputNota1.value);
            let n2= parseFloat(inputNota2.value);
            let n3= parseFloat(inputNota3.value);
            let n4= parseFloat(inputNota4.value);
            
            if (ra.length<8) {
                alert("Erro no ra");
                inputRA.focus();
                return;
            }

            if (nomesplit.length<2) {
                alert("É preciso sobrenome");
                inputNome.focus();
                return;
            
            }else if(nomesplit[0].length<3||nomesplit[1].length<3){
                alert("Erro no nome");
                inputNome.focus();
                return;
            }

            if ( isNaN(n1)||n1<0||n1>10) {
                alert("Erro na nota 1");
                inputNota1.focus()
                return;
            }
            
            if ( isNaN(n2)||n2<0||n2>10) {
                alert("Erro na nota 2");
                inputNota2.focus()
                return;
            }
            
            if ( isNaN(n3)||n3<0||n3>10) {
                alert("Erro na nota 3");
                inputNota3.focus()
                return;
            }
            
            if ( isNaN(n4)||n4<0||n4>10) {
                alert("Erro na nota 4");
                inputNota4.focus()
                return;
            }
            
            const meuPacoteDeDados = {               
                ra: ra,
                nome: nome,
                nota1: n1,
                nota2: n2,
                nota3: n3,
                nota4: n4
            };
            
            try {
                const response = await fetch(`http://${enderecoServidor}:${porta}/enviar-mensagem`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(meuPacoteDeDados),
                });
                
                const data = await response.text();
                const {resposta} = JSON.parse(data); 
                
                document.getElementById("respostaDoServidor").innerHTML =  resposta;
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro na comunicação com o servidor');
            }
        }
       
       // --- NOVA FUNÇÃO PARA ENVIAR IMAGEM ---
        async function enviarImagem() {
            const enderecoServidor = document.getElementById('enderecoServidorInput').value;
            const porta = document.getElementById('inputPorta').value;
            const inputImagem = document.getElementById('inputImagem');

            // Verifica se o usuário de fato selecionou um arquivo
            if (inputImagem.files.length === 0) {
                alert('Por favor, selecione uma imagem primeiro!');
                return;
            }

            // Captura o arquivo propriamente dito
            const arquivoImagem = inputImagem.files[0];

            // IMPORTANTE: Criamos um FormData para estruturar o envio do arquivo
            const formData = new FormData();
            // O primeiro parâmetro 'foto' deve ser exatamente igual ao configurado no upload.single('foto') do servidor
            formData.append('foto', arquivoImagem);

            try {
                document.getElementById("respostaImagem").innerHTML = "Enviando...";

                // Faz a requisição FETCH enviando o formData diretamente no body
                // NOTA: Não adicionamos o 'Content-Type' nos headers. O próprio navegador define o Content-Type correto com o "boundary" necessário para multipart/form-data.
                const response = await fetch(`http://${enderecoServidor}:${porta}/enviar-imagem`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Falha na resposta do servidor');
                }

                const data = await response.json(); // Recebe o JSON de resposta

                // Atualiza o HTML com a mensagem retornada pelo servidor
                document.getElementById("respostaImagem").innerHTML = 
                    `Status: ${data.mensagem}<br>Salvo como: <b>${data.nomeArquivo}</b>`;

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById("respostaImagem").innerHTML = "Erro ao enviar.";
                alert('Erro na comunicação com o servidor ao enviar imagem');
            }
        }
    </script>

</body>

</html>
