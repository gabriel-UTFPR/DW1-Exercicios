<!DOCTYPE html>
<html>

<head>
    <title>Teorema de pitágoras</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
   
    <header>
        <h1>Insira o valor dos Catetos</h1>
    </header>
    
    <main>

       <div>
           <label for="enderecoServidorInput">Endereço do Servidor:</label>
           <input type="text" id="enderecoServidorInput" placeholder="Digite o endereço do servidor" value="localhost">
       </div>
       <div>
           <label for="inputPorta">Porta:</label>
           <input type="text" id="inputPorta" placeholder="Digite a porta" value="3000">
       </div>
       <div>
           <label for="inputA">Cateto A:</label>
           <input type="number" id="inputA" placeholder="Digite uma número">
       </div>
       <div>
           <label for="inputB">Cateto B:</label>
           <input type="number" id="inputB" placeholder="Digite uma número">
       </div>
       <div>
           <button onclick="Calcular()">Enviar</button>
       </div>
    </main>   
    
    <footer>
        <h3>Resposta do servidor:</h3>
        <h2 id="respostaDoServidor">.....</h2> 
    </footer>
           
      

    
    <script>
        async function Calcular() {            
            const A = parseFloat(document.getElementById('inputA').value);
            const B = parseFloat(document.getElementById('inputB').value);
            if (isNaN(A)|| isNaN(B)|| A<=0||B<=0) {
                alert('Erro, digite um numero válido')
                return
            }
            const enderecoServidor = document.getElementById('enderecoServidorInput').value;
            const porta = document.getElementById('inputPorta').value;
            try {
                const response = await fetch(`http://${enderecoServidor}:${porta}/pitagoras`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ A,B })
                });

                const data = await response.text();
                debugger
                document.getElementById("respostaDoServidor").innerHTML = data;
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro na comunicação com o servidor');
            }
        }
    </script>
</body>

</html>
