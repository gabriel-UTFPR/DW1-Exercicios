<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        Cálculo de IMC com Classificação
    </header>

    <main>
        <section>
            <h1>Calcule seu IMC</h1>

            <label for="inputPeso" id="labelDoPeso">Peso(kg)</label>
            <input type="number" id="inputPeso">

            <label for="inputAltura" id="labelDaAltura">Altura(cm)</label>
            <input type="number" id="inputAltura">

            <button onclick="funcaoCalcular()">Calcular</button>

            <div class="resultado">
                <p id="labelIMC"><strong>IMC:</strong> <span id="respIMC">0</span></p>
                <p id="labelClass"><strong>Classificação:</strong> <span id="respClass">-</span></p>
            </div>
        </section>
        
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>

    <script src="script.js"></script>

</body>

</html>
