<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Flex.css">
    <title>Flex</title>
</head>
<body>
    <div class="linha1">
        <div class="coluna1_1">1.1</div>

        <div class="coluna1_4">4.1</div>
        <div class="coluna2_4"> 
            <div class="sublinha1_1_4">
                <img class="casa" src="./imagens/Casa.jpg" alt="imagem casa">

            </div>
            <div class="sublinha2_1_4">
                <img class="castelo" src="./imagens/Castelo.jpg" alt="imagem castelo">
